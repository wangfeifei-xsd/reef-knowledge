# 构建 Android APK、Windows 安装包、macOS Apple Silicon（aarch64）安装包；不包含 macOS Intel。
name: Build installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npm run tauri:build

      # Windows 仅构建 NSIS（见 tauri.windows.conf.json），避免 WiX light.exe 与中文 productName 在 CI 上失败。
      - name: Upload Windows bundles
        uses: actions/upload-artifact@v5
        with:
          name: windows-installers
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  macos-apple-silicon:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (macOS arm64 only)
        run: npm run tauri:build -- --target aarch64-apple-darwin

      - name: Upload macOS arm64 bundles
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm64-installers
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

  # 未配置 release 密钥时，CI 会用标准 Android debug 密钥（android/androiddebugkey）对 APK 签名，多数厂商比「完全未签名」更易安装。
  # 正式发版建议在 Secrets 中配置：
  #   ANDROID_KEYSTORE_BASE64、ANDROID_KEYSTORE_PASSWORD、ANDROID_KEY_ALIAS、[ANDROID_KEY_PASSWORD]
  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # 勿在此启用 cache: gradle：Gradle 工程由 tauri android init 生成，检出时不存在会报错。
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: Export NDK_HOME
        run: echo "NDK_HOME=${ANDROID_HOME}/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Init Android project
        run: npx tauri android init --ci

      - name: Build APK
        run: npx tauri android build --apk

      # 注意：不能在步骤 if 中使用 secrets.*（GitHub 会报 Invalid workflow）。改为在脚本里判断 env 是否为空。
      - name: Sign APK（release 密钥或标准 debug 密钥）
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/35.0.0"
          UNSIGNED=$(find src-tauri/gen/android/app/build/outputs/apk -type f \( -name '*-unsigned.apk' -o -name '*unsigned*.apk' \) | head -1)
          if [ -z "${UNSIGNED}" ] || [ ! -f "${UNSIGNED}" ]; then
            echo "未找到 unsigned APK，当前 outputs："
            find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' 2>/dev/null || true
            exit 1
          fi
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "使用仓库 Secrets 中的 release 密钥签名。"
            KEY_PASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/sign.keystore
            KS_PASS="${ANDROID_KEYSTORE_PASSWORD}"
            ALIAS="${ANDROID_KEY_ALIAS}"
          else
            echo "::notice::未配置 ANDROID_KEYSTORE_BASE64，使用标准 Android debug 密钥签名（android / androiddebugkey）。"
            keytool -genkeypair -v \
              -keystore /tmp/sign.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -noprompt
            KS_PASS=android
            KEY_PASS=android
            ALIAS=androiddebugkey
          fi
          ALIGNED="/tmp/aligned.apk"
          SIGNED="/tmp/reef-signed.apk"
          "${BUILD_TOOLS}/zipalign" -f -p 4 "${UNSIGNED}" "${ALIGNED}"
          "${BUILD_TOOLS}/apksigner" sign \
            --ks /tmp/sign.keystore \
            --ks-pass "pass:${KS_PASS}" \
            --ks-key-alias "${ALIAS}" \
            --key-pass "pass:${KEY_PASS}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out "${SIGNED}" \
            "${ALIGNED}"
          "${BUILD_TOOLS}/apksigner" verify --print-certs "${SIGNED}"
          rm -f /tmp/sign.keystore "${ALIGNED}"
          mkdir -p src-tauri/gen/android/app/build/outputs/apk/signed-for-artifact
          cp -f "${SIGNED}" src-tauri/gen/android/app/build/outputs/apk/signed-for-artifact/

      - name: 汇总待上传的 APK
        run: |
          mkdir -p out-apk
          shopt -s nullglob
          if compgen -G "src-tauri/gen/android/app/build/outputs/apk/signed-for-artifact/*.apk" > /dev/null; then
            cp -f src-tauri/gen/android/app/build/outputs/apk/signed-for-artifact/*.apk out-apk/
          else
            find src-tauri/gen/android/app/build/outputs/apk -type f -path '*/release/*' -name '*.apk' -exec cp -f {} out-apk/ \;
          fi
          ls -la out-apk/

      - name: Upload Android APK
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: out-apk/*.apk
          if-no-files-found: warn
